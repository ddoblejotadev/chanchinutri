name: Bug report
description: Report a reproducible bug
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill all relevant details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is happening?
      placeholder: Short bug summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Add exact steps so we can reproduce the problem.
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happens?
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: e.g. v1.0.5
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. Samsung A54
  - type: input
    id: os
    attributes:
      label: OS version
      placeholder: e.g. Android 14
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs or add screenshots if available.
