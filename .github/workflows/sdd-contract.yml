name: SDD Contract

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  sdd-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SDD command contracts
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d ".config/opencode/commands" ]]; then
            target_dir=".config/opencode/commands"
          elif [[ -d ".opencode/commands" ]]; then
            target_dir=".opencode/commands"
          else
            echo "Missing opencode commands directory (.config/opencode/commands or .opencode/commands)."
            exit 1
          fi

          required=(sdd-init.md sdd-new.md sdd-ff.md sdd-continue.md sdd-apply.md sdd-verify.md sdd-archive.md)
          for f in "${required[@]}"; do
            if [[ ! -f "$target_dir/$f" ]]; then
              echo "Missing required SDD command: $target_dir/$f"
              exit 1
            fi
          done

          for f in sdd-new.md sdd-ff.md sdd-continue.md; do
            if ! grep -q "agent: sdd-orchestrator" "$target_dir/$f"; then
              echo "Command $f must use sdd-orchestrator"
              exit 1
            fi
          done

          echo "SDD contract: PASS"
