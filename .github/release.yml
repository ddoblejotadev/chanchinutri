changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
    authors:
      - dependabot
  categories:
    - title: "Cambios para usuarios"
      labels:
        - feature
        - enhancement
        - fix
        - bug
    - title: "Mejoras de estabilidad y mantenimiento"
      labels:
        - performance
        - refactor
        - chore
        - ci
        - test
        - docs
    - title: "Dependencias"
      labels:
        - dependencies
    - title: "Otros cambios"
      labels:
        - "*"

template: |
  ## Resumen para usuarios
  Esta versión incluye mejoras para facilitar el uso diario de EvaPigApp y mantener resultados más confiables.

  ## Cambios funcionales visibles
  $CHANGES

  ## Mejoras técnicas internas (breve)
  Incluye ajustes de calidad, automatizaciones y mantenimiento interno para mejorar estabilidad y velocidad de publicación.

  ## Compatibilidad e instalación
  - Compatible con el mismo flujo de instalación de Android de versiones anteriores.
  - Si ya usás la app, actualizá a esta versión para recibir mejoras y correcciones.

  ## Colaboradores
  $CONTRIBUTORS

empty_template: |
  ## Resumen para usuarios
  Esta versión incluye mejoras menores y tareas de mantenimiento.

  ## Cambios funcionales visibles
  - No hubo cambios funcionales destacados para usuarios en esta publicación.

  ## Mejoras técnicas internas (breve)
  - Actualizaciones internas para calidad y mantenimiento.

  ## Compatibilidad e instalación
  - Se mantiene la compatibilidad con la instalación habitual.
